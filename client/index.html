<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberDeck</title>
    <meta name="description" content="CyberDeck - Your self-hosted media hub, knowledge base, and file manager">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="stylesheet" href="css/style.css">
    <!-- Leaflet for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- EPUB.js for Ebook Reader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.93/epub.min.js"></script>
</head>

<body>
    <!-- Login Screen -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-header">
                <span class="login-logo">⚡</span>
                <h1 class="login-title">CyberDeck</h1>
                <p class="login-subtitle">Enter your credentials to continue</p>
            </div>
            <div class="login-form">
                <div class="login-field">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="username"
                        onkeydown="if(event.key==='Enter') document.getElementById('loginPassword').focus()">
                </div>
                <div class="login-field">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="password"
                        onkeydown="if(event.key==='Enter') Auth.login()">
                </div>
                <div class="login-error" id="loginError" style="display:none"></div>
                <button class="login-btn" onclick="Auth.login()">Sign In</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">CyberDeck</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
        </div>
        <div class="nav-items">
            <button class="nav-item active" data-module="music" onclick="switchModule('music')">
                <span class="nav-icon">🎵</span>
                <span class="nav-label">Music</span>
            </button>
            <button class="nav-item" data-module="photos" onclick="switchModule('photos')">
                <span class="nav-icon">📸</span>
                <span class="nav-label">Photos</span>
            </button>
            <button class="nav-item" data-module="videos" onclick="switchModule('videos')">
                <span class="nav-icon">🎬</span>
                <span class="nav-label">Videos</span>
            </button>
            <button class="nav-item" data-module="llm" onclick="switchModule('llm')">
                <span class="nav-icon">🤖</span>
                <span class="nav-label">AI Chat</span>
            </button>
            <button class="nav-item" data-module="wiki" onclick="switchModule('wiki')">
                <span class="nav-icon">📚</span>
                <span class="nav-label">Wikipedia</span>
            </button>
            <button class="nav-item" data-module="maps" onclick="switchModule('maps')">
                <span class="nav-icon">🗺️</span>
                <span class="nav-label">Maps</span>
            </button>
            <button class="nav-item" data-module="ebooks" onclick="switchModule('ebooks')">
                <span class="nav-icon">📖</span>
                <span class="nav-label">Ebooks</span>
            </button>
            <button class="nav-item" data-module="files" onclick="switchModule('files')">
                <span class="nav-icon">📁</span>
                <span class="nav-label">Files</span>
            </button>
            <div class="nav-divider"></div>
            <button class="nav-item" data-module="survival" onclick="switchModule('survival')">
                <span class="nav-icon">🛡️</span>
                <span class="nav-label">Survival</span>
            </button>
            <button class="nav-item" data-module="utils" onclick="switchModule('utils')">
                <span class="nav-icon">🧮</span>
                <span class="nav-label">Utilities</span>
            </button>
            <button class="nav-item" data-module="vault" onclick="switchModule('vault')">
                <span class="nav-icon">🔐</span>
                <span class="nav-label">Vault</span>
            </button>
            <button class="nav-item" data-module="chat" onclick="switchModule('chat')">
                <span class="nav-icon">📡</span>
                <span class="nav-label">LAN Chat</span>
            </button>
            <button class="nav-item" data-module="power" onclick="switchModule('power')">
                <span class="nav-icon">🔋</span>
                <span class="nav-label">Power</span>
            </button>
            <button class="nav-item" data-module="store" onclick="switchModule('store')">
                <span class="nav-icon">📦</span>
                <span class="nav-label">Store</span>
            </button>
        </div>
        <div class="sidebar-footer">
            <div class="user-info" id="userInfo" style="display:none">
                <span class="user-avatar">👤</span>
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="Auth.logout()" title="Logout">⏻</button>
            </div>
            <div class="connection-status" id="connStatus">
                <span class="conn-dot"></span>
                <span class="conn-text">Connected</span>
            </div>
        </div>
    </nav>

    <!-- Sidebar Backdrop (mobile: tap to close) -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Module containers -->
        <div class="module active" id="mod-music"></div>
        <div class="module" id="mod-photos"></div>
        <div class="module" id="mod-videos"></div>
        <div class="module" id="mod-llm"></div>
        <div class="module" id="mod-wiki"></div>
        <div class="module" id="mod-maps"></div>
        <div class="module" id="mod-ebooks"></div>
        <div class="module" id="mod-files"></div>
        <div class="module" id="mod-survival"></div>
        <div class="module" id="mod-utils"></div>
        <div class="module" id="mod-vault"></div>
        <div class="module" id="mod-chat"></div>
        <div class="module" id="mod-power"></div>
        <div class="module" id="mod-store"></div>
    </main>

    <!-- Music Player Bar (persistent at bottom) -->
    <div class="player-bar" id="playerBar" style="display:none">
        <div class="player-track-info">
            <div class="player-cover" id="playerCover"></div>
            <div class="player-meta">
                <div class="player-title" id="playerTitle">—</div>
                <div class="player-artist" id="playerArtist">—</div>
            </div>
        </div>
        <div class="player-controls">
            <button class="player-btn" onclick="MusicPlayer.prev()">⏮</button>
            <button class="player-btn play-btn" id="playBtn" onclick="MusicPlayer.toggle()">▶</button>
            <button class="player-btn" onclick="MusicPlayer.next()">⏭</button>
        </div>
        <div class="player-progress-area">
            <span class="player-time" id="playerCurrentTime">0:00</span>
            <div class="player-progress" id="playerProgress" onclick="MusicPlayer.seek(event)">
                <div class="player-progress-fill" id="playerProgressFill"></div>
            </div>
            <span class="player-time" id="playerDuration">0:00</span>
        </div>
        <div class="player-volume">
            <span class="vol-icon" onclick="MusicPlayer.toggleMute()">🔊</span>
            <input type="range" min="0" max="1" step="0.01" value="1" class="vol-slider" id="volSlider"
                oninput="MusicPlayer.setVolume(this.value)">
        </div>
    </div>

    <!-- Audio element -->
    <audio id="audioElement" preload="auto"></audio>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/music.js"></script>
    <script src="js/photos.js"></script>
    <script src="js/videos.js"></script>
    <script src="js/llm.js"></script>
    <script src="js/wiki.js"></script>
    <script src="js/maps.js"></script>
    <script src="js/ebooks.js"></script>
    <script src="js/files.js"></script>
    <script src="js/survival.js"></script>
    <script src="js/utilities.js"></script>
    <script src="js/vault.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/power.js"></script>
    <script src="js/store.js"></script>
</body>

</html>
